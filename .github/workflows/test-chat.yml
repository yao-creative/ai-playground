name: test-chat

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-chat:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --locked

      - name: Load env from GitHub secrets
        run: |
          cp .env.example .env
          sed -i "s|OPENAI_API_KEY=.*|OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}|" .env
          sed -i "s|OPENAI_MODEL=.*|OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}|" .env
          sed -i "s|RUN_LIVE_TESTS=.*|RUN_LIVE_TESTS=${{ secrets.RUN_LIVE_TESTS }}|" .env

      - name: Run test-chat
        run: make test-chat
